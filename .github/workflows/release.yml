name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag (for example v1.2.3)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate version input
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          case "$VERSION" in
            v*)
              ;;
            *)
              echo "Version must start with v, got: $VERSION" >&2
              exit 1
              ;;
          esac

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          output="dist/stc2stw"
          if [ "$GOOS" = "windows" ]; then
            output="${output}.exe"
          fi
          go build -trimpath -o "$output" cmd/stc2stw/main.go

      - name: Package artifact
        env:
          VERSION: ${{ github.event.inputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          artifact_base="stc2stw_${VERSION#v}_${GOOS}_${GOARCH}"
          mkdir -p package
          if [ "$GOOS" = "windows" ]; then
            cp dist/stc2stw.exe package/stc2stw.exe
            archive_path="${artifact_base}.zip"
            (
              cd package
              zip -9 -q "../${archive_path}" stc2stw.exe
            )
          else
            cp dist/stc2stw package/stc2stw
            archive_path="${artifact_base}.tar.gz"
            tar -C package -czf "${archive_path}" stc2stw
          fi
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_path }}
          path: ${{ steps.package.outputs.archive_path }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          case "$VERSION" in
            v*)
              ;;
            *)
              echo "Version must start with v, got: $VERSION" >&2
              exit 1
              ;;
          esac

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION" >&2
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create git tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "refs/tags/$VERSION"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "$VERSION" release-assets/*/*
